<div class="background">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="calculator">

  <div class="top">
    <h1>Advanced Calculator</h1>

    <button id="themeBtn">
      🌙
    </button>
  </div>

  <div class="display">

    <div id="history"></div>

    <input
      type="text"
      id="screen"
      readonly
      placeholder="0"
    />

  </div>

  <div class="buttons">

    <button class="gray">AC</button>
    <button class="gray">⌫</button>
    <button class="gray">%</button>
    <button class="orange">÷</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="orange">×</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="orange">−</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="orange">+</button>

    <button>±</button>
    <button>0</button>
    <button>.</button>
    <button class="equal">=</button>

  </div>

  <div class="scientific">

    <button>√</button>
    <button>x²</button>
    <button>xʸ</button>
    <button>(</button>

    <button>)</button>
    <button>π</button>
    <button>e</button>
    <button>Copy</button>

  </div>

</div>
<div class="datetime">

    <span id="currentDate"></span>

    <span id="currentTime"></span>

</div>
<div class="history-panel">

    <div class="history-header">

        <h3>History</h3>

        <button id="clearHistory">
            Clear
        </button>

    </div>

    <ul id="historyList"></ul>

</div>
<div class="memory-buttons">

<button id="mc">MC</button>
<button id="mr">MR</button>
<button id="mplus">M+</button>
<button id="mminus">M-</button>

</div>
<div class="theme-switcher">

<h3>Theme</h3>

<button class="theme-btn blue" data-theme="blue"></button>

<button class="theme-btn purple" data-theme="purple"></button>

<button class="theme-btn green" data-theme="green"></button>

</div>
<div class="export-section">

    <button id="exportHistory">
        📥 Export History
    </button>

</div>
<div id="loader">

    <div class="spinner"></div>

    <h2>Advanced Calculator</h2>

    <p>Loading...</p>

</div>
